    </text>

    <!-- Email Service -->
    <rect x="880" y="910" width="220" height="90" fill="#ffffff" stroke="#2563eb" stroke-width="2" rx="4"/>
    <text x="990" y="935" font-size="13" font-weight="bold" text-anchor="middle" fill="#000000" opacity="1">
